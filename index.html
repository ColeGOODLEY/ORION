<!DOCTYPE html>
<html>

<head>

<title>ORION HUD</title>

<style>
<link rel="stylesheet" href="style.css">
</style>

</head>


<body>


<h1>ORION</h1>

<h3>
Operational Research & Intelligence for Optimization & Navigation
</h3>


<div class="panel">

<h2>CORE STATUS</h2>

<p class="online">
🟦 SYSTEM ONLINE
</p>

<p>
AI CORE: INITIALIZING
<br>
MEMORY: READY
<br>
VERSION: 0.3
</p>

</div>



<div class="panel">

<h2>MISSION CONTROL</h2>

<textarea placeholder="Today's Mission"></textarea>

<br>

<textarea placeholder="Objectives"></textarea>

</div>



<div class="panel">

<h2>COMMAND INTERFACE</h2>

<input id="command" placeholder="Speak to ORION...">

<br><br>

<button onclick="executeORION()">
EXECUTE
</button>


<h2>ORION RESPONSE</h2>

<p id="response">
Awaiting command...
</p>


</div>




<script>

function executeORION(){

let command =
document.getElementById("command").value;


let response =
document.getElementById("response");


if(command == ""){

response.innerHTML =
"Command required.";

}

else {


response.innerHTML =
"Command received.<br><br>" +
"Analyzing: " + command +
"<br><br>" +
"ORION is standing by.";


}


}


</script>


</body>

</html>
