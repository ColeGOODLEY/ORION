<!DOCTYPE html>
<html>

<head>

<title>ORION HUD</title>

<style>

body {
background: #05070d;
color: #00bfff;
font-family: "Courier New", monospace;
text-align: center;
padding: 30px;
}

h1 {
font-size: 70px;
letter-spacing: 10px;
text-shadow: 0 0 20px #00bfff;
}

h2 {
text-shadow: 0 0 10px #00bfff;
}

.panel {
border: 1px solid #00bfff;
box-shadow: 0 0 15px #00bfff;
border-radius: 15px;
padding: 25px;
margin: 25px auto;
max-width: 700px;
}

input, textarea {

background: #020409;
color: #00bfff;
border: 1px solid #00bfff;
width: 85%;
padding: 15px;
border-radius: 8px;
font-family: inherit;

}


button {

background: transparent;
color: #00bfff;
border: 1px solid #00bfff;
padding: 15px 40px;
border-radius: 10px;
cursor: pointer;
font-family: inherit;
box-shadow: 0 0 10px #00bfff;

}


button:hover {

background: #00bfff;
color: black;

}


#response {

min-height: 60px;
margin-top: 20px;

}


.online {

animation: pulse 2s infinite;

}


@keyframes pulse {

0% {
opacity: .5;
}

50% {
opacity: 1;
}

100% {
opacity: .5;
}

}

</style>

</head>


<body>


<h1>ORION</h1>

<h3>
Operational Research & Intelligence for Optimization & Navigation
</h3>


<div class="panel">

<h2>CORE STATUS</h2>

<p class="online">
🟦 SYSTEM ONLINE
</p>

<p>
AI CORE: INITIALIZING
<br>
MEMORY: READY
<br>
VERSION: 0.3
</p>

</div>



<div class="panel">

<h2>MISSION CONTROL</h2>

<textarea placeholder="Today's Mission"></textarea>

<br>

<textarea placeholder="Objectives"></textarea>

</div>



<div class="panel">

<h2>COMMAND INTERFACE</h2>

<input id="command" placeholder="Speak to ORION...">

<br><br>

<button onclick="executeORION()">
EXECUTE
</button>


<h2>ORION RESPONSE</h2>

<p id="response">
Awaiting command...
</p>


</div>




<script>

function executeORION(){

let command =
document.getElementById("command").value;


let response =
document.getElementById("response");


if(command == ""){

response.innerHTML =
"Command required.";

}

else {


response.innerHTML =
"Command received.<br><br>" +
"Analyzing: " + command +
"<br><br>" +
"ORION is standing by.";


}


}


</script>


</body>

</html>
